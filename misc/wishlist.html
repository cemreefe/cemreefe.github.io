<script>
  // Function to handle the click event on headers.
  function handleClick(event) {
    // Get the element's ID.
    const id = this.id;

    // Define the base URL.
    const baseUrl = window.location.href.split('#')[0];

    // Construct the URL with ID.
    const urlWithId = baseUrl + '#' + id;

    // Update the browser's URL without reloading the page.
    window.history.pushState(null, null, urlWithId);

    // Scroll to the element with the specified ID.
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
  }

  // Add a DOMContentLoaded event listener to run the code when the document is ready.
  document.addEventListener('DOMContentLoaded', function() {
      // Add a click event listener to the specified header elements (h2, h3, h4).
      document.querySelectorAll('h2, h3, h4').forEach(function(header) {
          header.addEventListener('click', handleClick);
      });
  });
</script>
<script>
    // temporary script for applying custom styles
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function switchStylesheet(newHref) {
        // Get all current link elements in the head
        const links = document.querySelectorAll('link[rel=stylesheet]');

        // Loop through the link elements and remove them
        links.forEach(link => {
            link.parentNode.removeChild(link);
        });

        // Create a new link element for the new stylesheet
        const newLink = document.createElement('link');
        newLink.rel = 'stylesheet';
        newLink.href = newHref;

        // Append the new link element to the head
        document.head.appendChild(newLink);
    }

    function addStyleParamToLinks(style) {
        const links = document.querySelectorAll('a[href]');
        links.forEach(link => {
            const url = new URL(link.href);
            url.searchParams.set('style', style);
            link.href = url.toString();
        });
    }

    // On page load, check for the 'style' query parameter and apply style
    window.addEventListener('DOMContentLoaded', () => {
        const style = getQueryParam('style');
        if (style) {
            const stylesheetHref = `/static/css/${style}.css`;
            switchStylesheet(stylesheetHref);
            addStyleParamToLinks(style);
        }
    });
</script>

<!-- Scroll reveal animations -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var staggerDelay = 80;
    var observer = new IntersectionObserver(function(entries) {
      var queue = [];
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          queue.push(entry.target);
          observer.unobserve(entry.target);
        }
      });
      queue.forEach(function(el, i) {
        setTimeout(function() {
          el.style.animationDelay = '0ms';
          el.classList.add('revealed');
        }, i * staggerDelay);
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('main > *').forEach(function(el, i) {
      if (i < 10) {
        el.classList.add('reveal-ready');
        el.style.animationDelay = (i * 60) + 'ms';
        el.classList.add('revealed');
      } else {
        el.classList.add('reveal-ready');
        observer.observe(el);
      }
    });

    document.querySelectorAll('.projectCard').forEach(function(el) {
      el.classList.add('reveal-ready');
      observer.observe(el);
    });

    document.querySelectorAll('.postPreview').forEach(function(el) {
      el.classList.add('reveal-ready');
      observer.observe(el);
    });
  });
</script>

<!-- Photo gallery marquee cloning -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var imgSize = 122;
    document.querySelectorAll('[data-gallery-row]').forEach(function(track) {
      var seed = track.innerHTML;
      var count = track.querySelectorAll('img').length;
      var oneSetWidth = count * imgSize;
      var reps = Math.ceil((window.innerWidth * 2) / oneSetWidth);
      for (var i = 0; i < reps; i++) {
        track.insertAdjacentHTML('beforeend', seed);
      }
      var oneSet = track.innerHTML;
      track.insertAdjacentHTML('beforeend', oneSet);
    });
  });
</script>

<!-- Highlight current page in navbar -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
      var currentPageURL = window.location.href;
      var links = document.querySelectorAll('a');
      links.forEach(function(link) {
          const linkPath = new URL(link.href).pathname.replace(/\/$/, '') || '/';
          const pagePath = new URL(currentPageURL).pathname.replace(/\/$/, '') || '/';
          if (linkPath === pagePath) {
              link.classList.add('nav-current');
          }
      });
  });
</script>
