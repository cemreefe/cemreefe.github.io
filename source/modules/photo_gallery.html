<script>
  document.addEventListener('DOMContentLoaded', function() {
    var lightbox = document.getElementById('galleryLightbox');
    var lightboxImg = lightbox && lightbox.querySelector('.galleryLightbox-img');
    var closeBtn = lightbox && lightbox.querySelector('.galleryLightbox-close');
    if (!lightbox || !lightboxImg) return;
    document.querySelectorAll('.photoMarquee-track img').forEach(function(img) {
      img.style.cursor = 'pointer';
      img.addEventListener('click', function() {
        lightboxImg.src = img.src;
        lightbox.classList.add('galleryLightbox--open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      });
    });
    function closeLightbox() {
      lightbox.classList.remove('galleryLightbox--open');
      lightbox.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }
    if (closeBtn) closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && lightbox.classList.contains('galleryLightbox--open')) closeLightbox();
    });
  });
</script>
